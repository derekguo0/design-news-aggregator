<script>
document.addEventListener('DOMContentLoaded', function() {
    const filterElement = document.getElementById('category-filter');
    const filterPlaceholder = document.getElementById('filter-placeholder');
    const filterLinks = document.querySelectorAll('.filter-btn');
    
    if (!filterElement) return;
    
    let isSticky = false;
    let filterOffset = 0;
    
    // 计算筛选器的初始位置
    function updateFilterOffset() {
        filterOffset = filterElement.offsetTop;
    }
    
    // 滚动监听 - 固定筛选器
    function handleScroll() {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        
        // 重新计算offset以防页面布局变化
        if (!isSticky) {
            updateFilterOffset();
        }
        
        // 阈值设为 50px，更早触发置顶
        if (scrollTop > filterOffset - 50 && !isSticky) {
            // 激活固定模式
            isSticky = true;
            filterElement.classList.add('filter-sticky');
            filterPlaceholder.style.height = filterElement.offsetHeight + 'px';
            
            // 添加视觉提示
            filterElement.style.transform = 'none';
            filterElement.style.transition = 'all 0.3s ease';
            
            console.log('🔝 分类导航已固定到顶部', { scrollTop, filterOffset });
        } else if (scrollTop <= filterOffset - 100 && isSticky) {
            // 取消固定模式
            isSticky = false;
            filterElement.classList.remove('filter-sticky');
            filterPlaceholder.style.height = '0px';
            
            console.log('📍 分类导航恢复原位', { scrollTop, filterOffset });
        }
        
        // 更新当前活跃的导航按钮
        updateActiveNav();
    }
    
    // 更新活跃导航状态
    function updateActiveNav() {
        const sections = document.querySelectorAll('section[id]');
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        
        let currentSection = '';
        
        sections.forEach(section => {
            const sectionTop = section.offsetTop - 180; // 调整检测偏移量
            const sectionHeight = section.offsetHeight;
            
            if (scrollTop >= sectionTop && scrollTop < sectionTop + sectionHeight) {
                currentSection = section.id;
            }
        });
        
        // 如果没有匹配到任何section，默认激活第一个
        if (!currentSection && sections.length > 0) {
            currentSection = sections[0].id;
        }
        
        // 更新按钮状态
        filterLinks.forEach(link => {
            const href = link.getAttribute('href').substring(1); // 移除 #
            if (href === currentSection) {
                link.classList.add('active');
                // 移除非活跃状态的类
                link.classList.remove('text-gray-700', 'dark:text-gray-300', 'bg-gray-50', 'dark:bg-gray-700');
                // 添加活跃状态的类
                link.classList.add('text-white', 'bg-gradient-to-r', 'from-indigo-500', 'to-purple-600');
                // 重置样式属性
                link.style.background = '';
                link.style.color = '';
                link.style.borderColor = '';
            } else {
                link.classList.remove('active');
                // 移除活跃状态的类
                link.classList.remove('text-white', 'bg-gradient-to-r', 'from-indigo-500', 'to-purple-600');
                // 添加非活跃状态的类
                link.classList.add('text-gray-700', 'dark:text-gray-300', 'bg-gray-50', 'dark:bg-gray-700');
                // 重置样式属性
                link.style.background = '';
                link.style.color = '';
                link.style.borderColor = '';
            }
        });
    }
    
    // 平滑滚动到锚点
    filterLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('href').substring(1);
            const targetElement = document.getElementById(targetId);
            
            if (targetElement) {
                const offsetTop = targetElement.offsetTop - 160; // 考虑header + 分类导航的高度
                window.scrollTo({
                    top: offsetTop,
                    behavior: 'smooth'
                });
            }
        });
    });
    
    // 绑定滚动事件
    window.addEventListener('scroll', handleScroll);
    window.addEventListener('resize', function() {
        updateFilterOffset(); // 重新计算位置
        if (isSticky) {
            filterPlaceholder.style.height = filterElement.offsetHeight + 'px';
        }
    });
    
    // 初始化
    setTimeout(() => {
        updateFilterOffset();
        handleScroll();
    }, 100); // 延迟初始化确保DOM完全渲染
});
</script>

        // 智能刷新 - 支持本地和线上环境

            try {
                // 本地冷却检查（默认180秒，可被后端返回覆盖）

                    const seconds = Math.ceil(cooldownRemaining / 1000);
                    updateProgress('⚠️', '操作过于频繁', `请${seconds}秒后再试`);
                    showRefreshProgress();
                    setTimeout(() => {
                        hideRefreshProgress();
                    }, 2000);
                    return;
                }
                // 检查网络连接状态
                if (!navigator.onLine) {
                    throw new Error('网络连接已断开，请检查您的网络连接后重试');
                }
                
                // 显示加载状态
                refreshBtn.innerHTML = '⏳ 刷新中...';
                refreshBtn.disabled = true;
                showRefreshProgress();
                
                // 显示初始状态
                updateProgress('🔍', '检查连接', '正在连接服务器...');
                
                // 使用指数重试的 fetch 调用刷新API
                const data = await fetchWithRetry('/api/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    cache: 'no-cache'
                }, 3, 1000);
                console.log('刷新API响应:', data);  // 添加调试日志
                
                if (data && data.success) {

                        const cooldown = (data.cooldown_seconds || 60) * 1000;
                        setLastTriggerTime(cooldown);
                        
                        // 直接显示新内容，不管API返回什么
                        setTimeout(() => {
                            hideRefreshProgress();
                            refreshBtn.innerHTML = originalText;
                            refreshBtn.disabled = false;
                            
                            // 显示固定的新资讯内容

                    } else if (data.deployment_type === 'serverless') {

                            updateProgress('⏳', '更新进行中', '预计需要2-3分钟完成...');
                            await new Promise(resolve => setTimeout(resolve, 3000));
                            
                            // 设置本地冷却时间（使用后端返回或默认180秒）
                            const cooldown = (data.cooldown_seconds || 180) * 1000;
                            setLastTriggerTime(cooldown);

                            updateProgress('🔁', '正在等待部署完成', '我会自动检测完成并刷新页面...');
                            // 开始轮询部署状态，成功后自动刷新
                            startStatusPolling('/api/status', {
                                onSuccess: () => {
                                    updateProgress('✅', '部署完成！', '正在刷新页面...');
                                    setTimeout(() => {
                                        // 清缓存并刷新
                                        if ('caches' in window) {
                                            caches.keys().then(names => names.forEach(name => caches.delete(name)));
                                        }
                                        window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now();
                                    }, 1200);
                                },
                                onUpdate: (info) => {
                                    // 根据状态更新提示
                                    const { status, conclusion } = info || {};
                                    let text = '更新进行中...';
                                    if (status === 'queued') text = '已排队等待执行...';
                                    if (status === 'in_progress') text = '正在生成与部署...';
                                    if (status === 'completed' && conclusion === 'success') text = '部署完成';
                                    if (status === 'completed' && conclusion === 'failure') text = '部署失败，请稍后重试或手动触发';
                                    updateProgress('⏳', '更新进度', text);
                                },
                                onTimeout: () => {

                                    setTimeout(() => {

                    } else {

                        setTimeout(() => {

                            refreshBtn.disabled = false;

                } else {

                    if (data.status === 'local_refresh_required') {

                    errorMessage = '网络错误';
                    errorDetail = error.message;

                    errorMessage = 'API错误';
                    errorDetail = error.message;

                    errorMessage = '连接失败';
                    errorDetail = '无法连接到服务器，请检查网络连接';

                    refreshBtn.disabled = false;

        // 带超时+指数退避重试的 fetch 工具
        async function fetchWithRetry(url, options = {}, retries = 2, backoffMs = 1000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            try {
                const resp = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeoutId);
                if (!resp.ok) {
                    // 401/403 不重试
                    if (resp.status === 401 || resp.status === 403) {
                        throw new Error(`服务器响应错误: ${resp.status} ${resp.statusText}`);
                    }
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, backoffMs));
                        return fetchWithRetry(url, options, retries - 1, backoffMs * 2);
                    }
                    throw new Error(`服务器响应错误: ${resp.status} ${resp.statusText}`);
                }
                return resp.json();
            } catch (e) {
                clearTimeout(timeoutId);
                if (e.name === 'AbortError') {
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, backoffMs));
                        return fetchWithRetry(url, options, retries - 1, backoffMs * 2);
                    }
                }
                throw e;
            }
        }

        // 轮询 GitHub Actions 状态
        function startStatusPolling(statusUrl, { onSuccess, onUpdate, onTimeout } = {}) {
            const start = Date.now();
            const timeoutMs = 5 * 60 * 1000; // 最长5分钟，给足时间
            const intervalMs = 8000; // 每8秒查询一次，减少API调用
            let lastCommitTime = null;
            
            const timer = setInterval(async () => {
                try {
                    const resp = await fetch(statusUrl, { cache: 'no-store' });
                    const data = await resp.json();
                    
                    if (onUpdate) {
                        // 更详细的状态描述
                        let statusText = '';
                        if (data.status === 'queued') statusText = '任务已排队...';
                        else if (data.status === 'in_progress') statusText = '正在抓取资讯并生成...';
                        else if (data.status === 'completed') {
                            if (data.conclusion === 'success') statusText = '内容生成完成，准备部署...';
                            else statusText = '生成失败，请稍后重试';
                        }
                        onUpdate({ status: data.status, conclusion: data.conclusion, statusText });
                    }
                    
                    // 检测到成功完成 - 等待几秒确保Vercel部署完成后刷新
                    if (data.status === 'completed' && data.conclusion === 'success') {
                        clearInterval(timer);
                        updateProgress('🚀', '部署中...', '正在部署到线上，即将自动刷新');
                        // 等待Vercel部署完成再刷新（预留30秒）
                        setTimeout(() => {
                            if (onSuccess) onSuccess();
                        }, 30000);
                    }
                    
                    // 检测到失败
                    if (data.status === 'completed' && data.conclusion !== 'success') {
                        clearInterval(timer);
                        updateProgress('❌', '生成失败', '请稍后重试或手动触发');
                        setTimeout(() => {
                            hideRefreshProgress();
                            document.querySelector('.refresh-btn').innerHTML = '🔄 刷新资讯';
                            document.querySelector('.refresh-btn').disabled = false;
                        }, 3000);
                    }
                    
                } catch (e) {
                    console.warn('状态查询失败', e);
                }
                
                if (Date.now() - start > timeoutMs) {
                    clearInterval(timer);
                    if (onTimeout) onTimeout();
                }
            }, intervalMs);
            return () => clearInterval(timer);
        }

        // 本地冷却：防止频繁点击
        function getCooldownRemaining() {
            try {
                const info = JSON.parse(localStorage.getItem('refreshCooldown') || '{}');
                if (!info || !info.expiresAt) return 0;
                const remaining = info.expiresAt - Date.now();
                return remaining > 0 ? remaining : 0;
            } catch { return 0; }
        }

        function setLastTriggerTime(cooldownMs) {
            try {
                localStorage.setItem('refreshCooldown', JSON.stringify({
                    setAt: Date.now(),
                    expiresAt: Date.now() + cooldownMs
                }));
            } catch {}
        }

        // 模拟进度条动画
        async function simulateProgress() {
            const progressBar = document.querySelector('.refresh-progress-fill');
            
            return new Promise((resolve) => {
                let progress = 0;
                const steps = [
                    { threshold: 20, icon: '🔗', title: '正在连接', detail: '连接到各大资讯源...' },
                    { threshold: 40, icon: '📡', title: '正在爬取', detail: '获取最新设计资讯...' },
                    { threshold: 60, icon: '🔍', title: '正在分析', detail: '筛选优质内容...' },
                    { threshold: 80, icon: '⚙️', title: '正在处理', detail: '生成页面内容...' },
                    { threshold: 90, icon: '✨', title: '即将完成', detail: '最后整理中...' }
                ];
                
                const interval = setInterval(() => {
                    progress += Math.random() * 8 + 3; // 每次增加3-11%，速度更平稳
                    
                    if (progress >= 90) {
                        progress = 90; // 保持在90%直到真正完成
                        clearInterval(interval);
                        resolve();
                    }
                    
                    progressBar.style.width = `${progress}%`;
                    
                    // 根据进度更新提示文案
                    const currentStep = steps.find(step => progress < step.threshold) || steps[steps.length - 1];
                    updateProgress(currentStep.icon, currentStep.title, currentStep.detail);
                    
                }, 1000); // 每1秒更新一次，更稳定
            });
        }

        // 更新进度显示
        function updateProgress(icon, text, detail) {
            // 更新文本内容
            document.querySelector('.refresh-progress-text').textContent = text;
            document.querySelector('.refresh-progress-detail').textContent = detail;
            
            // 如果需要更改图标状态（比如取消时）
            const iconElement = document.querySelector('.refresh-progress-icon');
            if (icon === '⚠️') {
                // 显示警告图标
                iconElement.classList.remove('text-blue-600');
                iconElement.classList.add('text-yellow-500');
                iconElement.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
                `;
            } else if (icon === '✅') {
                // 显示成功图标
                iconElement.classList.remove('text-blue-600');
                iconElement.classList.add('text-green-500');
                iconElement.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                `;
            }
        }

        // 取消刷新
        function cancelRefresh() {
            refreshCancelled = true; // 设置取消标志
            const refreshBtn = document.querySelector('.refresh-btn');
            const originalText = '🔄 刷新资讯';
            
            updateProgress('⚠️', '刷新已取消', '您已取消刷新操作，后台任务将继续完成。');
            
            setTimeout(() => {
                hideRefreshProgress();
                refreshBtn.innerHTML = originalText;
                refreshBtn.disabled = false;
            }, 2000);
        }

        // 显示调试信息
        async function showDebugInfo() {
            try {
                const response = await fetch('/api/debug');
                const debugData = await response.json();
                
                let debugMessage = '🔍 系统调试信息\n\n';
                debugMessage += `⏰ 时间: ${debugData.timestamp}\n\n`;
                debugMessage += `🌐 环境检测:\n`;
                debugMessage += `• VERCEL: ${debugData.environment.VERCEL}\n`;
                debugMessage += `• VERCEL_ENV: ${debugData.environment.VERCEL_ENV}\n`;
                debugMessage += `• GitHub Token: ${debugData.environment.GITHUB_TOKEN}\n\n`;
                debugMessage += `🎯 部署状态:\n`;
                debugMessage += `• 在Vercel环境: ${debugData.deployment_detection.is_vercel ? '是' : '否'}\n`;
                debugMessage += `• GitHub Token配置: ${debugData.deployment_detection.has_github_token ? '是' : '否'}\n\n`;
                debugMessage += `💡 解决建议:\n`;
                debugData.debug_tips.refresh_not_working.forEach((tip, index) => {
                    debugMessage += `${index + 1}. ${tip}\n`;
                });
                debugMessage += `\n🔗 手动触发: ${debugData.debug_tips.manual_github_actions}`;
                
                alert(debugMessage);
            } catch (error) {
                alert('📊 无法获取调试信息\n\n可能原因：\n• API服务不可用\n• 网络连接问题\n\n请检查控制台获取更多信息');
                console.error('调试信息获取失败:', error);
            }
        }

        // 按ESC键取消
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const progressModal = document.getElementById('refreshProgress');
                if (progressModal && progressModal.style.display === 'flex') {
                    cancelRefresh();
                }
            }
        });

        // 回到顶部功能
        document.addEventListener('DOMContentLoaded', function() {
            const backToTopBtn = document.getElementById('backToTop');
            let isVisible = false;
            let ticking = false;
            
            // 节流函数，优化滚动性能
            function throttle(func, limit) {
                let inThrottle;
                return function() {
                    const args = arguments;
                    const context = this;
                    if (!inThrottle) {
                        func.apply(context, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                }
            }
            
            // 检查是否应该显示按钮
            function checkScrollPosition() {
                const scrolled = window.pageYOffset;
                const screenHeight = window.innerHeight;
                const shouldShow = scrolled > screenHeight;
                
                if (shouldShow && !isVisible) {
                    // 显示按钮
                    backToTopBtn.classList.remove('opacity-0', 'translate-y-16', 'pointer-events-none');
                    backToTopBtn.classList.add('opacity-100', 'translate-y-0');
                    isVisible = true;
                } else if (!shouldShow && isVisible) {
                    // 隐藏按钮
                    backToTopBtn.classList.add('opacity-0', 'translate-y-16', 'pointer-events-none');
                    backToTopBtn.classList.remove('opacity-100', 'translate-y-0');
                    isVisible = false;
                }
                ticking = false;
            }
            
            // 监听滚动事件（使用节流优化性能）
            window.addEventListener('scroll', throttle(function() {
                if (!ticking) {
                    requestAnimationFrame(checkScrollPosition);
                    ticking = true;
                }
            }, 100));
            
            // 点击回到顶部
            backToTopBtn.addEventListener('click', function(e) {
                e.preventDefault();
                
                // 添加点击动画
                backToTopBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    backToTopBtn.style.transform = '';
                }, 150);
                
                // 平滑滚动到顶部
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
                
                // 暂时隐藏按钮，避免用户重复点击
                setTimeout(() => {
                    if (window.pageYOffset <= window.innerHeight) {
                        backToTopBtn.classList.add('opacity-0', 'translate-y-16', 'pointer-events-none');
                        backToTopBtn.classList.remove('opacity-100', 'translate-y-0');
                        isVisible = false;
                    }
                }, 500);
            });
            
            // 键盘支持 - 按 Home 键回到顶部
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Home' && e.ctrlKey) {
                    e.preventDefault();
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>

    <!-- 回到顶部按钮 -->
    <button id="backToTop" 
            class="fixed bottom-6 right-6 md:bottom-8 md:right-8 z-50 
                   opacity-0 translate-y-16 pointer-events-none
                   transition-all duration-300 ease-in-out
                   bg-white 
                   border border-gray-200
                   text-gray-600
                   hover:text-gray-900
                   hover:bg-gray-50
                   hover:border-gray-300
                   hover:shadow-lg hover:shadow-gray-400/25
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2
                   rounded-full p-3 md:p-3.5
                   shadow-md backdrop-blur-sm
                   active:scale-95
                   group"
            aria-label="回到顶部"
            title="回到顶部">
        <svg class="w-5 h-5 md:w-6 md:h-6 transition-transform duration-200 group-hover:-translate-y-0.5" 
             fill="none" 
             stroke="currentColor" 
             viewBox="0 0 24 24" 
             xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" 
                  stroke-linejoin="round" 
                  stroke-width="2.5" 
                  d="M5 10l7-7m0 0l7 7m-7-7v18">
            </path>
        </svg>
    </button>
